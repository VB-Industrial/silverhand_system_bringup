controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    rover_base_controller:
      type: diff_drive_controller/DiffDriveController

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    hand_controller:
      type: joint_trajectory_controller/JointTrajectoryController

rover_base_controller:
  ros__parameters:
    left_wheel_names:
      - left_front_wheel_joint
      - left_middle_wheel_joint
      - left_rear_wheel_joint
    right_wheel_names:
      - right_front_wheel_joint
      - right_middle_wheel_joint
      - right_rear_wheel_joint
    wheel_separation: 0.64
    wheel_radius: 0.15
    publish_rate: 50.0
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true
    open_loop: true
    cmd_vel_timeout: 0.5
    use_stamped_vel: false
    pose_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.01]

arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false

hand_controller:
  ros__parameters:
    joints:
      - hand_left_finger_joint
      - hand_right_finger_joint
    command_interfaces:
      - position
      - effort
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
